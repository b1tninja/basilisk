services:
  azurite:
    image: mcr.microsoft.com/azure-storage/azurite
    command: azurite --blobHost 0.0.0.0 --tableHost 0.0.0.0
    ports:
      - "10000:10000"
      - "10002:10002"

  basilisk:
    build:
      context: .
      dockerfile: docker/basilisk/Dockerfile
    env_file: .env
    ports:
      - "8080:8080"
    depends_on:
      - azurite

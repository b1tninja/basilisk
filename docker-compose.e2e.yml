services:
  azurite:
    image: mcr.microsoft.com/azure-storage/azurite
    command: azurite --blobHost 0.0.0.0 --tableHost 0.0.0.0
    ports:
      - "10000:10000"
      - "10002:10002"

  basilisk:
    build:
      context: .
      dockerfile: docker/basilisk/Dockerfile
    env_file:
      - path: .env.test
        required: false
    environment:
      BASILISK_BASE_URL: http://localhost:8080
      BASILISK_DEV_APPROVE: "1"
      BASILISK_TOKEN_SECRET: ${BASILISK_TOKEN_SECRET:-ci-test-secret}
    ports:
      - "8080:8080"
    depends_on:
      - azurite
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/health')"]
      interval: 5s
      timeout: 3s
      retries: 10

  gpg-tester:
    build:
      context: .
      dockerfile: docker/gpg-tester/Dockerfile

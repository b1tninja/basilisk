name: marketplace

on:
  push:
    paths:
      - marketplace/**
      - infra/**
  pull_request:
    paths:
      - marketplace/**
      - infra/**

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - run: bash scripts/package-marketplace.sh
      - run: az bicep build --file marketplace/mainTemplate.bicep

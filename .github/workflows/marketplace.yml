name: marketplace

on:
  push:
    paths:
      - marketplace/**
      - infra/**
  pull_request:
    paths:
      - marketplace/**
      - infra/**

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - run: bash scripts/package-marketplace.sh
      - run: az bicep build --file marketplace/mainTemplate.bicep

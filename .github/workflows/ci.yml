name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      BASILISK_TOKEN_SECRET: ${{ secrets.BASILISK_TOKEN_SECRET }}
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: requirements-dev.txt
      - run: pip install -r requirements-dev.txt
      - name: Prepare environment files
        run: bash scripts/prepare-ci-env.sh
      - run: python -m pytest tests/unit tests/integration -q --cov=basilisk --cov-report=term-missing

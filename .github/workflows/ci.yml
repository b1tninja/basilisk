name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      BASILISK_TOKEN_SECRET: ${{ secrets.BASILISK_TOKEN_SECRET }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: requirements-dev.txt
      - name: Install dependencies
        run: pip install --require-hashes -r requirements-dev.txt

      - name: Python vulnerability audit
        uses: pypa/gh-action-pip-audit@1220774d901786e6f652ae159f7b6bc8fea6d266 # v1.1.0
        with:
          inputs: requirements.txt

      - name: Prepare environment files
        run: bash scripts/prepare-ci-env.sh

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Build portal
        working-directory: web
        run: |
          npm ci
          npm run build
      - name: Node vulnerability audit
        working-directory: web
        run: npm audit --audit-level=moderate

      - run: python -m pytest tests/unit tests/integration -q --cov=basilisk --cov-report=term-missing

  sbom:
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Generate SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          path: .
          format: spdx-json
          output-file: basilisk.spdx.json
          upload-artifact: true
          artifact-name: basilisk-sbom-${{ github.sha }}

  terraform:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: terraform/cloudshell
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4
        with:
          terraform_version: 1.9.8
          terraform_wrapper: false
      - name: Terraform fmt
        run: terraform fmt -check -recursive ..
      - name: Terraform init (no backend)
        run: terraform init -backend=false
      - name: Terraform validate
        run: terraform validate

name: deploy

on:
  workflow_dispatch:
    inputs:
      name_prefix:
        description: Resource name prefix (must match initial Terraform deploy)
        type: string
        default: basilisk-dev
      location:
        description: Azure region (empty = auto-detect from existing RG or eastus)
        type: string
        default: ""
      mail_provider:
        description: Logic App mail connector
        type: choice
        options:
          - office365
          - gmail
        default: office365
      skip_terraform:
        description: Skip infrastructure; publish function code only
        type: boolean
        default: false
      enable_microsoft_signin:
        description: Microsoft sign-in — auto enables when AZURE_CREDENTIALS is set
        type: choice
        options:
          - auto
          - on
          - off
        default: auto
      enable_google_signin:
        description: Google sign-in — auto enables when GOOGLE_CLIENT_ID and GOOGLE_CLIENT_SECRET are set
        type: choice
        options:
          - auto
          - on
          - off
        default: auto

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    # Require reviewers on the GitHub Environment named "production".
    environment: production
    concurrency:
      group: deploy-${{ inputs.name_prefix }}
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Build portal
        working-directory: web
        run: |
          npm ci
          npm run build

      # Set repository variable USE_AZURE_OIDC=true and secrets AZURE_CLIENT_ID,
      # AZURE_TENANT_ID, AZURE_SUBSCRIPTION_ID for federated login; otherwise
      # AZURE_CREDENTIALS (SP JSON) is used.
      - name: Azure login (OIDC)
        if: ${{ vars.USE_AZURE_OIDC == 'true' }}
        uses: azure/login@a457da9ea143d694b1b9c7c869ebb04ebe844ef5 # v2.3.0
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Azure login (service principal JSON)
        if: ${{ vars.USE_AZURE_OIDC != 'true' }}
        uses: azure/login@532459ea530d8321f2fb9bb10d1e0bcf23869a43 # v3.0.0
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4
        with:
          terraform_version: 1.9.8
          terraform_wrapper: false

      - name: Cache Terraform providers
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: terraform/cloudshell/.terraform
          key: tf-providers-${{ inputs.name_prefix }}-${{ hashFiles('terraform/cloudshell/.terraform.lock.hcl') }}
          restore-keys: |
            tf-providers-${{ inputs.name_prefix }}-

      - name: Resolve sign-in settings
        env:
          MICROSOFT_SIGNIN_MODE: ${{ inputs.enable_microsoft_signin }}
          GOOGLE_SIGNIN_MODE: ${{ inputs.enable_google_signin }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          AZURE_CREDENTIALS: ${{ secrets.AZURE_CREDENTIALS }}
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
        run: bash scripts/resolve-deploy-auth.sh

      - name: Deploy infrastructure and function
        env:
          ARM_USE_OIDC: ${{ vars.USE_AZURE_OIDC == 'true' && 'true' || 'false' }}
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID || fromJSON(secrets.AZURE_CREDENTIALS).clientId }}
          ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID || fromJSON(secrets.AZURE_CREDENTIALS).tenantId }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID || fromJSON(secrets.AZURE_CREDENTIALS).subscriptionId }}
          ARM_CLIENT_SECRET: ${{ vars.USE_AZURE_OIDC == 'true' && '' || fromJSON(secrets.AZURE_CREDENTIALS).clientSecret }}
          NAME_PREFIX: ${{ inputs.name_prefix }}
          LOCATION: ${{ inputs.location }}
          MAIL_PROVIDER: ${{ inputs.mail_provider }}
          # Default false — set repository/environment variable TF_AUTO_APPROVE=true to skip plan prompt.
          AUTO_APPROVE: ${{ vars.TF_AUTO_APPROVE || 'false' }}
          SKIP_TERRAFORM: ${{ inputs.skip_terraform }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: us-east-1
          TFSTATE_RESOURCE_GROUP: ${{ vars.TFSTATE_RESOURCE_GROUP }}
          TFSTATE_STORAGE_ACCOUNT: ${{ vars.TFSTATE_STORAGE_ACCOUNT }}
          TFSTATE_CONTAINER: ${{ vars.TFSTATE_CONTAINER }}
          TFSTATE_KEY: ${{ vars.TFSTATE_KEY }}
        run: bash scripts/deploy-github-actions.sh

      - name: Deployment summary
        if: always()
        run: |
          if cd terraform/cloudshell && terraform output -raw resource_group_name >/dev/null 2>&1; then
            FD_URL="$(cd terraform/cloudshell && terraform output -raw public_url 2>/dev/null || terraform output -raw front_door_url 2>/dev/null || true)"
            CUSTOM="$(cd terraform/cloudshell && terraform output -raw custom_domain 2>/dev/null || true)"
            RG="$(cd terraform/cloudshell && terraform output -raw resource_group_name 2>/dev/null || true)"
            FN="$(cd terraform/cloudshell && terraform output -raw function_app_name 2>/dev/null || true)"
            {
              echo "## Basilisk deploy"
              echo ""
              echo "| Item | Value |"
              echo "|------|-------|"
              echo "| Resource group | \`$RG\` |"
              echo "| Function app | \`$FN\` |"
              echo "| Front Door | $FD_URL |"
              if [[ -n "$CUSTOM" && "$CUSTOM" != "null" ]]; then
                echo "| Custom domain | \`$CUSTOM\` |"
              fi
              echo ""
              echo "Deploy includes function zip + static portal upload to Storage \`\$web\`."
            } >> "$GITHUB_STEP_SUMMARY"
          fi

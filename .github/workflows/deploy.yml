name: deploy

on:
  workflow_dispatch:
    inputs:
      name_prefix:
        description: Resource name prefix (must match initial Terraform deploy)
        type: string
        default: basilisk-dev
      location:
        description: Azure region (empty = auto-detect from existing RG or eastus)
        type: string
        default: ""
      mail_provider:
        description: Logic App mail connector
        type: choice
        options:
          - office365
          - gmail
        default: office365
      skip_terraform:
        description: Skip infrastructure; publish function code only
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: azure/login@v3
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: 1.9.8
          terraform_wrapper: false

      - name: Restore Terraform state
        uses: actions/cache@v5
        with:
          path: |
            terraform/cloudshell/terraform.tfstate
            terraform/cloudshell/terraform.tfstate.backup
            terraform/cloudshell/.terraform
          key: tf-${{ inputs.name_prefix }}-${{ hashFiles('terraform/**/*.tf', 'terraform/**/*.tpl') }}
          restore-keys: |
            tf-${{ inputs.name_prefix }}-

      - name: Deploy infrastructure and function
        env:
          NAME_PREFIX: ${{ inputs.name_prefix }}
          LOCATION: ${{ inputs.location }}
          MAIL_PROVIDER: ${{ inputs.mail_provider }}
          AUTO_APPROVE: "true"
          SKIP_TERRAFORM: ${{ inputs.skip_terraform }}
          TF_VAR_google_client_id: ${{ secrets.GOOGLE_CLIENT_ID }}
          TF_VAR_google_client_secret: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: us-east-1
        run: bash scripts/deploy-github-actions.sh

      - name: Deployment summary
        if: always()
        run: |
          if [[ -f terraform/cloudshell/terraform.tfstate ]]; then
            FD_URL="$(cd terraform/cloudshell && terraform output -raw public_url 2>/dev/null || terraform output -raw front_door_url 2>/dev/null || true)"
            CUSTOM="$(cd terraform/cloudshell && terraform output -raw custom_domain 2>/dev/null || true)"
            RG="$(cd terraform/cloudshell && terraform output -raw resource_group_name 2>/dev/null || true)"
            FN="$(cd terraform/cloudshell && terraform output -raw function_app_name 2>/dev/null || true)"
            {
              echo "## Basilisk deploy"
              echo ""
              echo "| Item | Value |"
              echo "|------|-------|"
              echo "| Resource group | \`$RG\` |"
              echo "| Function app | \`$FN\` |"
              echo "| Front Door | $FD_URL |"
              if [[ -n "$CUSTOM" && "$CUSTOM" != "null" ]]; then
                echo "| Custom domain | \`$CUSTOM\` |"
              fi
              echo ""
              echo "Deploy includes function zip + static portal upload to Storage \`\$web\`."
              echo ""
              echo "First-time setup: run \`bash scripts/export-github-secrets.sh\` locally after apply to copy Terraform-generated secrets into GitHub."
            } >> "$GITHUB_STEP_SUMMARY"
          fi

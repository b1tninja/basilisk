<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>My Keys — Basilisk</title>
  <link rel="stylesheet" href="/css/site.css">
</head>
<body>
  <nav>
    <a class="nav-logo" href="/">Basilisk</a>
    <div class="nav-links">
      <a class="nav-link" href="/">Search</a>
      <a class="nav-link active" href="/my-keys">My Keys</a>
      <a class="nav-link" href="/pks/lookup?op=stats">Stats</a>
    </div>
    <div class="auth-widget" id="auth-widget"></div>
  </nav>

  <div class="page-header">
    <h1>My Keys</h1>
    <p class="muted">Manage the OpenPGP keys associated with your identity.</p>
  </div>

  <div id="content"></div>
  <p id="error" class="text-error hidden"></p>

  <script src="/js/portal.js"></script>
  <script>
    const content = document.getElementById("content");
    const error   = document.getElementById("error");

    async function renderSignedOut() {
      const providers = await Auth.getProviders();
      const buttons = Auth.providerButtons("/my-keys", providers);
      const hint = providers.includes("google") && providers.includes("microsoft")
        ? "Sign in with your Microsoft or Google account to view, submit, and claim keys associated with your email address."
        : providers.includes("google")
          ? "Sign in with your Google account to view, submit, and claim keys associated with your email address."
          : "Sign in with your Microsoft account to view, submit, and claim keys associated with your email address.";
      content.innerHTML = `
        <div class="card" style="max-width:440px">
          <p class="card-title">Sign in to manage your keys</p>
          <p class="muted" style="margin-bottom:1.25rem">${hint}</p>
          ${buttons || "<p class='muted'>Sign-in is not configured.</p>"}
        </div>`;
    }

    function renderSignedIn(user, keys) {
      const userInfo =
        `<p style="margin-bottom:1.25rem">Signed in as
          <strong>${escapeHtml(user.email)}</strong></p>`;

      const uploadCard = `
        <div class="card">
          <p class="card-title">Submit a public key</p>
          <p class="muted" style="margin-bottom:1rem">
            Paste your armored public key or upload a <code>.asc</code> file.
            It will be associated with your account if a UID matches your email.
          </p>
          ${renderUploadForm()}
        </div>`;

      const keysSection = keys && keys.length
        ? `<h2>Your keys</h2>${renderKeysTable(keys, { showClaim: true })}`
        : `<p class="muted">No keys on file yet. Submit one above.</p>`;

      content.innerHTML = userInfo + uploadCard + keysSection;
    }

    async function loadMyKeys() {
      try {
        const user = await Auth.getUser();
        if (!user || !user.authenticated) {
          renderSignedOut();
          return;
        }
        const payload = await fetchJson("/api/v1/me/keys");
        renderSignedIn(user, payload.keys);
      } catch (err) {
        if (err.status === 401) {
          renderSignedOut();
        } else {
          showError(error, err.message);
        }
      }
    }

    Auth.initWidget(document.getElementById("auth-widget"), "/my-keys");
    loadMyKeys();
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Key — Basilisk</title>
  <link rel="stylesheet" href="/css/site.css">
</head>
<body>
  <nav>
    <a class="nav-logo" href="/">Basilisk</a>
    <div class="nav-links">
      <a class="nav-link" href="/">Search</a>
      <a class="nav-link" href="/my-keys">My Keys</a>
      <a class="nav-link" href="/stats">Stats</a>
    </div>
    <div class="auth-widget" id="auth-widget"></div>
  </nav>

  <div class="page-header">
    <h1 id="title">Key</h1>
    <p>Status: <span id="status" class="badge">…</span></p>
  </div>

  <p id="error" class="text-error hidden"></p>
  <pre id="armored" class="hidden"></pre>
  <p><a class="text-link" href="/">← Back to search</a></p>

  <script src="/js/portal.js"></script>
  <script>
    Auth.initWidget(document.getElementById("auth-widget"));

    const fpr     = queryParam("fpr");
    const error   = document.getElementById("error");
    const armored = document.getElementById("armored");
    const title   = document.getElementById("title");
    const status  = document.getElementById("status");

    if (!fpr) {
      showError(error, "Missing fingerprint — use ?fpr=…");
    } else {
      title.textContent = `Key ${fpr.toUpperCase()}`;
      (async () => {
        try {
          const search = fpr.startsWith("0x") ? fpr : `0x${fpr}`;
          const text = await fetchText(`/pks/lookup?op=get&search=${encodeURIComponent(search)}`);
          armored.textContent = text;
          armored.classList.remove("hidden");
          const cls = text.includes("BEGIN PGP") ? "badge approved" : "badge";
          status.className = cls;
          status.textContent = text.includes("BEGIN PGP") ? "available" : "unknown";
        } catch (err) {
          showError(error, err.message || "Key not found");
          status.className = "badge";
          status.textContent = "not found";
        }
      })();
    }
  </script>
</body>
</html>

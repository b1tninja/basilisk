<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Basilisk — Search keys</title>
  <link rel="stylesheet" href="/css/site.css">
</head>
<body>
  <nav>
    <a class="nav-logo" href="/">Basilisk</a>
    <div class="nav-links">
      <a class="nav-link active" href="/">Search</a>
      <a class="nav-link" href="/my-keys">My Keys</a>
      <a class="nav-link" href="/pks/lookup?op=stats">Stats</a>
    </div>
    <div class="auth-widget" id="auth-widget"></div>
  </nav>

  <div class="page-header">
    <h1>Search public keys</h1>
    <p class="muted">Look up approved OpenPGP keys by email address, fingerprint, or key ID.</p>
  </div>

  <form id="search-form">
    <div class="search-row">
      <input type="search" id="q" name="q"
             placeholder="user@example.com or 0x…" autocomplete="off" autofocus>
      <button class="btn" type="submit">Search</button>
    </div>
  </form>

  <p id="error" class="text-error hidden"></p>
  <div id="results"></div>

  <script src="/js/portal.js"></script>
  <script>
    Auth.initWidget(document.getElementById("auth-widget"));

    const form    = document.getElementById("search-form");
    const input   = document.getElementById("q");
    const results = document.getElementById("results");
    const error   = document.getElementById("error");

    async function runSearch(query) {
      error.classList.add("hidden");
      results.innerHTML = "";
      if (!query.trim()) return;
      try {
        const payload = await fetchJson(`/api/v1/search?q=${encodeURIComponent(query.trim())}`);
        if (!payload.results || !payload.results.length) {
          results.innerHTML = "<p class='muted'>No matching approved keys found.</p>";
          return;
        }
        results.innerHTML = renderKeysTable(payload.results);
      } catch (err) {
        showError(error, err.message);
      }
    }

    form.addEventListener("submit", (e) => {
      e.preventDefault();
      const q = input.value.trim();
      history.replaceState(null, "", q ? `/?q=${encodeURIComponent(q)}` : "/");
      runSearch(q);
    });

    const initial = queryParam("q");
    if (initial) { input.value = initial; runSearch(initial); }
  </script>
</body>
</html>

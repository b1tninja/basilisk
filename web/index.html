<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta http-equiv="Content-Security-Policy" content="default-src 'none'; script-src 'self'; style-src 'self'; connect-src 'self'; img-src 'self' data:; font-src 'self'; frame-ancestors 'none'; object-src 'none'; base-uri 'self'; form-action 'self';">
  <title>Basilisk — Search keys</title>
</head>
<body>
  <nav>
    <a class="nav-logo" href="/">Basilisk</a>
    <div class="nav-links">
      <a class="nav-link active" href="/">Search</a>
      <a class="nav-link" href="/compose">Encrypt</a>
      <a class="nav-link" href="/decrypt">Decrypt</a>
      <a class="nav-link" href="/my-keys">My Keys</a>
      <a class="nav-link" href="/stats">Stats</a>
    </div>
    <div class="auth-widget" id="auth-widget"></div>
  </nav>

  <div class="page-header">
    <h1>Search public keys</h1>
    <p class="muted">Look up approved OpenPGP keys by email address, fingerprint, or key ID.</p>
    <p style="margin-top:0.75rem">
      <a class="text-link" href="/my-keys">Submit a public key</a>
    </p>
  </div>

  <form id="search-form">
    <div class="search-row">
      <label class="sr-only" for="q">Search by email, fingerprint, or key ID</label>
      <input type="search" id="q" name="q"
             placeholder="user@example.com or 0x…" autocomplete="off" autofocus
             aria-describedby="search-hint">
      <button class="btn" type="submit">Search</button>
    </div>
    <p id="search-hint" class="muted" style="margin-top:0.5rem">Exact email, 40-char fingerprint, or 16-char key ID. Names are not searchable.</p>
  </form>

  <p id="error" class="text-error hidden"></p>
  <div id="results"></div>
  <div id="cli-help" style="margin-top:2rem"></div>

  <script type="module" src="/src/pages/index.js"></script>
</body>
</html>
